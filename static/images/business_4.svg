<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A"/>
      <stop offset="50%" style="stop-color:#1B2A4A"/>
      <stop offset="100%" style="stop-color:#0D1B2A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#C8A951;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#C8A951;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B6914"/>
      <stop offset="30%" style="stop-color:#C8A951"/>
      <stop offset="50%" style="stop-color:#F0DC82"/>
      <stop offset="70%" style="stop-color:#C8A951"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#C8A951" flood-opacity="0.35"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" fill="url(#bg)"/>
  <rect width="400" height="560" fill="url(#glow)"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="360" height="520" rx="4" fill="none" stroke="#C8A951" stroke-width="0.5" opacity="0.4"/>
  <rect x="28" y="28" width="344" height="504" rx="3" fill="none" stroke="#C8A951" stroke-width="0.3" opacity="0.25"/>

  <!-- Corner ornaments -->
  <path d="M35 45 L35 35 L45 35" fill="none" stroke="#C8A951" stroke-width="1.5" opacity="0.7"/>
  <path d="M365 45 L365 35 L355 35" fill="none" stroke="#C8A951" stroke-width="1.5" opacity="0.7"/>
  <path d="M35 515 L35 525 L45 525" fill="none" stroke="#C8A951" stroke-width="1.5" opacity="0.7"/>
  <path d="M365 515 L365 525 L355 525" fill="none" stroke="#C8A951" stroke-width="1.5" opacity="0.7"/>

  <!-- Gold light rays from center -->
  <g opacity="0.12">
    <line x1="200" y1="220" x2="80" y2="60" stroke="#C8A951" stroke-width="1"/>
    <line x1="200" y1="220" x2="320" y2="60" stroke="#C8A951" stroke-width="1"/>
    <line x1="200" y1="220" x2="50" y2="180" stroke="#C8A951" stroke-width="0.8"/>
    <line x1="200" y1="220" x2="350" y2="180" stroke="#C8A951" stroke-width="0.8"/>
    <line x1="200" y1="220" x2="140" y2="55" stroke="#C8A951" stroke-width="0.6"/>
    <line x1="200" y1="220" x2="260" y2="55" stroke="#C8A951" stroke-width="0.6"/>
  </g>

  <!-- Lightbulb icon -->
  <g transform="translate(200, 175)" filter="url(#shadow)">
    <!-- Bulb body -->
    <ellipse cx="0" cy="-15" rx="32" ry="38" fill="none" stroke="#C8A951" stroke-width="2"/>
    <ellipse cx="0" cy="-15" rx="32" ry="38" fill="#C8A951" opacity="0.08"/>
    <!-- Filament -->
    <path d="M-8 5 Q-8 -15 0 -30 Q8 -15 8 5" fill="none" stroke="#F0DC82" stroke-width="1.5" opacity="0.8"/>
    <!-- Base -->
    <rect x="-12" y="23" width="24" height="5" rx="2" fill="none" stroke="#C8A951" stroke-width="1.5"/>
    <rect x="-10" y="30" width="20" height="4" rx="2" fill="none" stroke="#C8A951" stroke-width="1.2"/>
    <rect x="-8" y="36" width="16" height="3" rx="1.5" fill="none" stroke="#C8A951" stroke-width="1"/>
    <!-- Glow dots -->
    <circle cx="-42" cy="-20" r="1.5" fill="#F0DC82" opacity="0.5"/>
    <circle cx="42" cy="-20" r="1.5" fill="#F0DC82" opacity="0.5"/>
    <circle cx="0" cy="-60" r="1.5" fill="#F0DC82" opacity="0.5"/>
    <circle cx="-35" cy="-45" r="1" fill="#F0DC82" opacity="0.4"/>
    <circle cx="35" cy="-45" r="1" fill="#F0DC82" opacity="0.4"/>
  </g>

  <!-- Top gold line -->
  <rect x="100" y="260" width="200" height="2" rx="1" fill="url(#goldBar)" opacity="0.6"/>

  <!-- Title -->
  <text x="200" y="305" text-anchor="middle" fill="#FFFFFF" font-size="30" font-family="Georgia, 'Playfair Display', serif" font-weight="bold" letter-spacing="1" filter="url(#softglow)">THINK</text>
  <text x="200" y="340" text-anchor="middle" fill="#C8A951" font-size="18" font-family="Georgia, 'Playfair Display', serif" font-style="italic" letter-spacing="3">&amp; GROW</text>
  <text x="200" y="380" text-anchor="middle" fill="#FFFFFF" font-size="30" font-family="Georgia, 'Playfair Display', serif" font-weight="bold" letter-spacing="1" filter="url(#softglow)">RICH</text>

  <!-- Bottom gold line -->
  <rect x="100" y="400" width="200" height="2" rx="1" fill="url(#goldBar)" opacity="0.6"/>

  <!-- Author -->
  <text x="200" y="440" text-anchor="middle" fill="#C8A951" font-size="13" font-family="Georgia, serif" letter-spacing="2.5" opacity="0.85">NAPOLEON HILL</text>

  <!-- Subtitle -->
  <text x="200" y="480" text-anchor="middle" fill="#8899AA" font-size="10" font-family="Georgia, serif" letter-spacing="1" opacity="0.6">THE TIMELESS CLASSIC ON SUCCESS</text>

  <!-- Publisher mark -->
  <text x="200" y="510" text-anchor="middle" fill="#C8A951" font-size="8" font-family="Georgia, serif" letter-spacing="3" opacity="0.35">PAGETURN BOOKS</text>
</svg>